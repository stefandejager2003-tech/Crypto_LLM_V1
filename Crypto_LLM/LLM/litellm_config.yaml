model_list:
  - model_name: deepseek-v3.2
    litellm_params:
      model: ollama_chat/deepseek-v3.2:cloud
      # Reverted to domain name. The hosts file will handle the routing.
      api_base: https://ollama.com
      api_key: os.environ/KEY_1

  - model_name: deepseek-v3.2
    litellm_params:
      model: ollama_chat/deepseek-v3.2:cloud
      api_base: https://ollama.com
      api_key: os.environ/KEY_2

  - model_name: deepseek-v3.2
    litellm_params:
      model: ollama_chat/deepseek-v3.2:cloud
      api_base: https://ollama.com
      api_key: os.environ/KEY_3

router_settings:
  routing_strategy: simple-shuffle # Shuffles requests across all healthy keys
  num_retries: 3                   # If a key hits a quota or 500 error, try the next one
  allowed_fails: 1                 # How many times a key can fail before being temporarily removed from the pool
  cooldown_time: 300